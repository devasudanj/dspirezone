  <circle cx="320" cy="128" r="8" fill="#FBBF24" opacity="0.9"/>
  <circle cx="440" cy="138" r="6" fill="#FDE68A" opacity="0.9"/>
  <circle cx="560" cy="148" r="8" fill="#FBBF24" opacity="0.9"/>
  <circle cx="680" cy="128" r="6" fill="#FDE68A" opacity="0.9"/>
  <circle cx="770" cy="118" r="8" fill="#FBBF24" opacity="0.9"/>
