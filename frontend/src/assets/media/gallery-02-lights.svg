  <path d="M0 200 Q200 180 400 210 Q600 240 800 200" stroke="#C084FC" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Glow dots -->
  <circle cx="150" cy="192" r="5" fill="#C084FC" opacity="0.8"/>
