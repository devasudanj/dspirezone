<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
  </defs>
  <rect width="800" height="533" fill="url(#bg4)"/>
  <!-- Spotlight beam -->
  <path d="M400 0 L280 533 L520 533 Z" fill="#F59E0B" opacity="0.08"/>
  <!-- Magician silhouette -->
  <ellipse cx="400" cy="320" rx="40" ry="80" fill="#1E1B4B" opacity="0.9"/>
  <circle cx="400" cy="220" r="32" fill="#2D0860"/>
  <!-- Top hat -->
  <rect x="374" y="180" width="52" height="50" rx="4" fill="#1A0540"/>
  <rect x="362" y="226" width="76" height="10" rx="5" fill="#2D0860"/>
  <!-- Wand -->
  <line x1="440" y1="280" x2="540" y2="200" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="544" cy="197" r="6" fill="#F59E0B"/>
  <!-- Stars / sparkles -->
  <circle cx="560" cy="160" r="5" fill="#F59E0B" opacity="0.9"/>
  <circle cx="580" cy="180" r="3" fill="#FCD34D" opacity="0.8"/>
  <circle cx="540" cy="145" r="4" fill="#FBBF24" opacity="0.9"/>
  <circle cx="600" cy="200" r="4" fill="#F59E0B" opacity="0.7"/>
  <text x="560" y="155" fill="#FCD34D" font-size="20" opacity="0.9">✦</text>
  <text x="500" y="130" fill="#C084FC" font-size="16" opacity="0.8">✦</text>
  <text x="630" y="170" fill="#F59E0B" font-size="14" opacity="0.8">✦</text>
  <!-- Audience -->
  <ellipse cx="150" cy="480" rx="50" ry="20" fill="#312E81" opacity="0.6"/>
  <ellipse cx="400" cy="500" rx="60" ry="18" fill="#312E81" opacity="0.6"/>
  <ellipse cx="650" cy="480" rx="50" ry="20" fill="#312E81" opacity="0.6"/>
  <!-- Label -->
  <text x="400" y="490" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="16" font-weight="600">Magic Show Performance</text>
</svg>
