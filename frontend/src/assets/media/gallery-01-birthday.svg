<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D0860"/>
      <stop offset="100%" stop-color="#4A0E8F"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A0E8F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="533" fill="url(#bg1)"/>
  <rect width="800" height="533" fill="url(#glow1)"/>
  <!-- Stage lights -->
  <ellipse cx="200" cy="0" rx="120" ry="200" fill="#F59E0B" opacity="0.15" transform="rotate(20, 200, 0)"/>
  <ellipse cx="600" cy="0" rx="120" ry="200" fill="#7B42D1" opacity="0.2" transform="rotate(-20, 600, 0)"/>
  <!-- Balloon strings -->
  <circle cx="150" cy="180" r="35" fill="#F59E0B" opacity="0.8"/>
  <circle cx="160" cy="170" r="35" fill="#FCD34D" opacity="0.7"/>
  <circle cx="640" cy="160" r="30" fill="#EC4899" opacity="0.8"/>
  <circle cx="655" cy="150" r="30" fill="#F472B6" opacity="0.7"/>
  <circle cx="400" cy="120" r="40" fill="#7B42D1" opacity="0.7"/>
  <!-- Table -->
  <rect x="250" y="350" width="300" height="16" rx="8" fill="white" opacity="0.9"/>
  <rect x="280" y="366" width="10" height="80" rx="5" fill="white" opacity="0.7"/>
  <rect x="510" y="366" width="10" height="80" rx="5" fill="white" opacity="0.7"/>
  <!-- Cake -->
  <rect x="360" y="290" width="80" height="60" rx="8" fill="#FCD34D" opacity="0.9"/>
  <rect x="350" y="270" width="100" height="30" rx="6" fill="#F59E0B" opacity="0.9"/>
  <!-- Candles -->
  <rect x="388" y="240" width="6" height="32" rx="3" fill="white" opacity="0.9"/>
  <ellipse cx="391" cy="238" rx="4" ry="6" fill="#FBBF24" opacity="0.9"/>
  <!-- Stars -->
  <text x="50" y="80" fill="#F59E0B" font-size="24" opacity="0.8">✦</text>
  <text x="700" y="100" fill="#FCD34D" font-size="18" opacity="0.6">✦</text>
  <text x="350" y="50" fill="white" font-size="20" opacity="0.5">✦</text>
  <!-- Label -->
  <text x="400" y="490" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="16" font-weight="600">Birthday Celebration Setup</text>
</svg>
