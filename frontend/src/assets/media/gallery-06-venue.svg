<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0A1A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="533" fill="url(#bg6)"/>
  <!-- Stage left -->
  <rect x="0" y="280" width="800" height="253" fill="#0F0E1A"/>
  <!-- Spotlights -->
  <ellipse cx="200" cy="533" rx="120" ry="50" fill="#F59E0B" opacity="0.3"/>
  <ellipse cx="400" cy="533" rx="100" ry="40" fill="#A78BFA" opacity="0.3"/>
  <ellipse cx="600" cy="533" rx="110" ry="45" fill="#EC4899" opacity="0.25"/>
  <!-- Confetti circles -->
  <circle cx="120" cy="120" r="8" fill="#F59E0B" opacity="0.9"/>
  <circle cx="200" cy="80" r="6" fill="#EC4899" opacity="0.8"/>
  <circle cx="350" cy="60" r="10" fill="#34D399" opacity="0.9"/>
  <circle cx="500" cy="90" r="7" fill="#A78BFA" opacity="0.9"/>
  <circle cx="650" cy="70" r="9" fill="#FBBF24" opacity="0.8"/>
  <circle cx="730" cy="110" r="6" fill="#F87171" opacity="0.9"/>
  <!-- More confetti -->
  <rect x="160" y="150" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.8" transform="rotate(30 166 156)"/>
  <rect x="270" y="130" width="10" height="10" rx="2" fill="#34D399" opacity="0.8" transform="rotate(45 275 135)"/>
  <rect x="550" y="120" width="12" height="12" rx="2" fill="#EC4899" opacity="0.8" transform="rotate(20 556 126)"/>
  <rect x="680" y="160" width="10" height="10" rx="2" fill="#A78BFA" opacity="0.8" transform="rotate(60 685 165)"/>
  <!-- Star cluster -->
  <text x="350" y="190" fill="#F59E0B" font-size="32" opacity="0.8">✦</text>
  <text x="420" y="170" fill="#FCD34D" font-size="20" opacity="0.6">✦</text>
  <text x="290" y="170" fill="#C084FC" font-size="18" opacity="0.6">✦</text>
  <!-- Central text -->
  <text x="400" y="250" text-anchor="middle" fill="white" font-family="sans-serif" font-size="30" font-weight="700" opacity="0.9">Your Celebration Awaits</text>
  <!-- Label -->
  <text x="400" y="490" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="16" font-weight="600">Venue Hall – Grand Event View</text>
