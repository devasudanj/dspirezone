<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>
  <rect width="800" height="533" fill="url(#bg3)"/>
  <!-- Food court tables -->
  <rect x="60" y="280" width="160" height="100" rx="10" fill="#D97706" opacity="0.8"/>
  <rect x="260" y="300" width="160" height="100" rx="10" fill="#B45309" opacity="0.8"/>
  <rect x="460" y="280" width="160" height="100" rx="10" fill="#D97706" opacity="0.8"/>
  <rect x="640" y="300" width="120" height="100" rx="10" fill="#B45309" opacity="0.8"/>
  <!-- Food items (plates) -->
  <circle cx="140" cy="330" r="28" fill="#FBBF24" opacity="0.7"/>
  <circle cx="340" cy="350" r="28" fill="#FDE68A" opacity="0.7"/>
  <circle cx="540" cy="330" r="28" fill="#FBBF24" opacity="0.7"/>
  <circle cx="700" cy="350" r="24" fill="#FDE68A" opacity="0.7"/>
  <!-- Overhead banner -->
  <rect x="0" y="60" width="800" height="60" fill="#065F46"/>
  <text x="400" y="98" text-anchor="middle" fill="#FBBF24" font-family="sans-serif" font-size="22" font-weight="700">🍽  Food Court  🍽</text>
  <!-- Counter top -->
  <rect x="0" y="160" width="800" height="80" rx="0" fill="#047857" opacity="0.8"/>
  <text x="400" y="207" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" opacity="0.9">Curated Catering • Live Counters • Custom Menus</text>
  <!-- Label -->
  <text x="400" y="490" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="16" font-weight="600">Food Court – Reserved Tables</text>
</svg>
